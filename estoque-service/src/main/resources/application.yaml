spring:
  application:
    name: estoque-service
  datasource:
    url: jdbc:h2:mem:estoquedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

server:
  port: 8081

# Porta do servidor gRPC
grpc:
  server:
    port: 9001

otel:
  java:
    global-autoconfigure:
      enabled: true
  service:
    name: estoque-service
  traces:
    exporter: otlp
  metrics:
    exporter: none
  logs:
    exporter: none
  exporter:
    otlp:
      endpoint: http://localhost:4318
      protocol: http/protobuf

logging:
  level:
    root: INFO
    br.com.poc.estoque: DEBUG
